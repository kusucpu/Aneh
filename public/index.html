<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aneh</title>
  <meta name="description" content="Chat Aneh">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/modal.css">
  <!-- Markdown -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- Syntax highlight -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // Init marked with highlight
    document.addEventListener('DOMContentLoaded', () => {
      marked.setOptions({
        highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        }
      });
    });
  </script>
</head>
<body>

<!-- Main layout: chat | sidebar -->
<div class="chat-area">
  <!-- Topbar -->
  <div class="topbar">
    <button class="btn-theme" id="btn-theme" title="Ganti tema"></button>
    <span class="topbar-title">Aneh</span>
    <button class="btn-hamburger" id="btn-hamburger" title="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="messages-inner" id="messages-inner"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea
        id="chat-input"
        placeholder="Ketik sesuatu yang aneh…"
        rows="1"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button class="btn-send" id="btn-send" disabled title="Kirim">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter untuk baris baru · Klik kirim untuk mengirim</div>
  </div>
</div>

<!-- Sidebar kanan -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      Aneh
      <span>Chat Aneh</span>
    </div>
  </div>

  <button class="btn-new-chat" id="btn-new-chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Chat Baru
  </button>

  <div class="history-label">Riwayat</div>
  <div class="history-list" id="history-list"></div>

  <div class="sidebar-footer">
    <button class="btn-api-key" id="btn-api-key">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
      </svg>
      API Key
      <span class="btn-api-key-status" id="api-key-status-dot"></span>
    </button>
  </div>
</div>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Modal API Key -->
<div class="modal-backdrop" id="modal-api">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">API Key</div>
        <div class="modal-desc">Key disimpan lokal di browser kamu.<br>Server menggunakan key dari environment Vercel.</div>
      </div>
      <button class="btn-modal-close" id="btn-modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-input-wrap">
      <input
        type="password"
        class="modal-input"
        id="api-key-input"
        placeholder="gsk_xxxxxxxxxxxx"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn-toggle-key" id="btn-toggle-key" title="Tampilkan/sembunyikan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="modal-key-status" id="modal-key-status"></div>

    <div class="modal-footer">
      <button class="btn-clear-key" id="btn-clear-key">Hapus Key</button>
      <button class="btn-modal-cancel" id="btn-cancel-key">Tutup</button>
      <button class="btn-modal-save" id="btn-save-key">Simpan</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
