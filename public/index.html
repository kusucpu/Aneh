<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aneh</title>
  <meta name="description" content="Chat Aneh">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/modal.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof marked !== 'undefined') {
        marked.setOptions({ highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
          return hljs.highlightAuto(code).value;
        }});
      }
    });
  </script>
</head>
<body>

<!-- Chat area -->
<div class="chat-area">
  <div class="topbar">
    <button class="btn-theme" id="btn-theme" title="Ganti tema"></button>
    <div class="topbar-spacer"></div>
    <button class="btn-hamburger" id="btn-hamburger" title="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="messages" id="messages">
    <div class="messages-inner" id="messages-inner"></div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="chat-input" placeholder="Ketik sesuatu yang aneh…" rows="1" autocomplete="off" spellcheck="false"></textarea>
      <button class="btn-image" id="btn-image" title="Generate gambar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <button class="btn-send" id="btn-send" disabled title="Kirim">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Sidebar kanan -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Aneh <span>Chat Aneh</span></div>
    <button class="btn-sidebar-close" id="btn-sidebar-close" title="Tutup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <button class="btn-new-chat" id="btn-new-chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Chat Baru
  </button>

  <!-- History view -->
  <div class="sidebar-view-history" id="sidebar-view-history">
    <div class="history-label">Riwayat</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Settings view -->
  <div class="sidebar-view-settings hidden" id="sidebar-view-settings">

    <div>
      <label class="settings-label">Provider API</label>
      <select id="settings-provider" class="settings-select"></select>
    </div>

    <div class="settings-key-section" id="settings-key-section">
      <div class="settings-key-header">
        <label class="settings-label" style="margin:0">API Key</label>
        <span class="key-status" id="settings-key-status">○ Belum diset</span>
      </div>
      <div class="settings-key-input-wrap">
        <input type="password" id="settings-key-input" placeholder="Masukkan key...">
        <button id="btn-toggle-settings-key" title="Tampilkan/sembunyikan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button id="btn-save-settings-key" class="btn-save-key">Simpan Key</button>
    </div>

    <div id="settings-provider-note" class="settings-note" style="display:none"></div>

    <div class="settings-models-section">
      <label class="settings-label">Model Chat</label>
      <div id="settings-chat-models"></div>
    </div>

    <div class="settings-models-section hidden" id="settings-image-models">
      <label class="settings-label">🖼️ Model Gambar</label>
      <div id="settings-image-models-list"></div>
    </div>

    <div class="settings-models-section hidden" id="settings-audio-models">
      <label class="settings-label">🎵 Model Audio</label>
      <div id="settings-audio-models-list"></div>
    </div>

  </div>

  <div class="sidebar-footer">
    <button class="btn-settings" id="btn-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Pengaturan</span>
    </button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="toast" id="toast"></div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
